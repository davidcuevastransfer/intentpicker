# GitHub Actions Workflow. Generated by gradlewise plugin (ver. 1.24.4)
# All manual changes to this file will be LOST on the next build.

name: "GradleWise"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
env:
  ARTIFACTORY_PASSWORD: ${{ secrets.ARTIFACTORY_PASSWORD }}
  ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
  DEPLOY_IMAGE_NAME: intentpicker
  DEPLOY_REGISTRY_URL: ${{ secrets.DEPLOY_REGISTRY_URL }}
  DEPLOY_SLACK_CHANNEL: '#intentpicker-releases'
  GA_GIT_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
  GA_WISE_GRADLE_LOGGING_ENABLED: ${{ vars.GA_WISE_GRADLE_LOGGING_ENABLED }}
  KAFKA_HOST: kafka
  POSTGRES_HOST: postgres
  REKOR_URL: ${{ vars.REKOR_URL }}
  ZK_KAFKA_HOST: zk-kafka
  ZK_SERVICE_HOST: zk-service

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build-and-test:
    name: "Build And Test"
    runs-on: gha-production-xlarge
    container: ci-images-release.arti.tw.ee/actions_java21
    outputs:
      publish-docker-snapshot: ${{ steps.trigger-docker.outputs.docker-upload }}

    env:
      KAFKA_HOST: kafka
      RUNS_IN_CI: true
      ZOOKEEPER_HOST: zk-service

    services:
      postgres:
        image: docker-hub.tw.ee/postgres:15.10-alpine
        env:
          POSTGRES_DB: intentpicker
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
      zk-kafka:
        image: docker-hub.tw.ee/zookeeper:3.8.3
        env:
          ZOO_MY_ID: 1
      zk-service:
        image: docker-hub.tw.ee/zookeeper:3.8.3
        env:
          ZOO_MY_ID: 1
      kafka:
        image: docker-hub.tw.ee/wurstmeister/kafka:2.13-2.6.3
        env:
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://:9092
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
          KAFKA_BROKER_ID: 1
          KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
          KAFKA_LISTENERS: PLAINTEXT://:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_MAX_TIMEOUT_MS: 7200000
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_ZOOKEEPER_CONNECT: zk-kafka:2181

    steps:
      - name: "Checkout git repo"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 1st commit is merge commit, we need one more to understand if snapshot is requested. However, for SonarQube we need full history.
      # Work around git repo permissions issues
      # See: https://github.com/transferwise/gradlewise/issues/60
      - name: "Add repo as safe directory"
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: "Check commit message for snapshot publishing"
        id: trigger-docker
        run: |
          set +x
          set +e
          git log --format='%s %b' -n 1 --skip 1 | grep -i '#publish-snapshot'
          if [ $? -eq 0 ]; then
            echo "Snapshot image is requested"
            echo "docker-upload=true" >> $GITHUB_OUTPUT;
          else
            echo "Snapshot image is not requested"
            echo "docker-upload=false" >> $GITHUB_OUTPUT;
          fi
        shell: bash
      - name: "Setup Gradle"
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.14.3"
          # Remove unused files from ~/.gradle so that it doesn't grow crazy-large
          gradle-home-cache-cleanup: true
          # Include jdks and wrappers directories to cache alongside default caches and notifications directories
          gradle-home-cache-includes: |
            caches
            notifications
            jdks
            wrapper
          # Exclude local build-cache and keyrings as they will be different for each workflow run
          gradle-home-cache-excludes: |
            caches/build-cache-1
            caches-keyrings
      - name: "Determine Branch"
        id: branch
        uses: transferwise/sanitize-branch-name@v1
      - name: "Assemble binaries"
        run: gradle --console=plain --stacktrace assemble bootJar testClasses
        env:
          GA_GIT_BRANCH: ${{ steps.branch.outputs.sanitized-branch-name }}
          PUBLISH_REQUESTED: ${{ steps.trigger-docker.outputs.docker-upload }}
      - name: "Run tests"
        run: gradle --console=plain --stacktrace --info check
        env:
          GA_GIT_BRANCH: ${{ steps.branch.outputs.sanitized-branch-name }}
          PUBLISH_REQUESTED: ${{ steps.trigger-docker.outputs.docker-upload }}
      - name: "Publish Test Report"
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          check_name: ":test (junitXml)"
          report_paths: 'build/test-results/test/**/*.xml'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          job_name: "build-and-test"
          comment: true
          detailed_summary: true
      - name: "Collect reports"
        run: gradle --console=plain --stacktrace zipReport
        env:
          GA_GIT_BRANCH: ${{ steps.branch.outputs.sanitized-branch-name }}
          PUBLISH_REQUESTED: ${{ steps.trigger-docker.outputs.docker-upload }}
        if: always()
      - name: "Store test results"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-test-reports
          path: "./build/combinedReports.zip"
          retention-days: 7
      - name: "Persist service package for docker image creation"
        uses: actions/upload-artifact@v4
        if: ${{ github.ref == 'refs/heads/main' || steps.trigger-docker.outputs.docker-upload == 'true' }}
        with:
          name: service-${{ github.run_id }}
          path: |
            build/libs/*.jar
          retention-days: 1
      - name: "Validate artifacts"
        uses: transferwise/slsa-checks/validate-artifacts@main
        with:
          artifactory_api_key: "${{ secrets.ARTIFACTORY_API_KEY }}"
          artifacts_json: "build/wise-spring-boot-build/non-local-dependencies.json"
          target_repo: "${{ github.repository }}"

  upload-docker:
    name: "Upload Docker"
    needs:
      - build-and-test
    runs-on: gha-production-medium
    container: ci-images-release.arti.tw.ee/k8s-deployer:4
    if: ${{ github.ref == 'refs/heads/main' || needs.build-and-test.outputs.publish-docker-snapshot == 'true' }}
    outputs:
      digest: ${{ steps.docker.outputs.digest }}
      image_name: ${{ steps.docker.outputs.image_name }}
      tag: ${{ steps.docker.outputs.tag }}

    steps:
      - name: "Checkout git repo"
        uses: actions/checkout@v4
      - name: "Add repo as safe directory"
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: "Retrieve service artifacts"
        uses: actions/download-artifact@v4
        with:
          name: service-${{ github.run_id }}
          path: build/libs/
      - name: "Upload docker image"
        id: docker
        run: k8s-deployment docker-multi-arch-build-push
        env:
          DEPLOY_IMAGE_SNAPSHOT: ${{ github.ref != 'refs/heads/main' }}
          DEPLOY_PLATFORM: linux/amd64,linux/arm64
          FAIL_BUILD_IF_VULNERABLE: false
          SLACK_API_TOKEN: ${{ secrets.SLACK_API_TOKEN }}
      - name: "Output version"
        run: |
          echo ${{ steps.docker.outputs.tag }} >> $GITHUB_STEP_SUMMARY

  provenance-container:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: [upload-docker]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: transferwise/slsa-generator/.github/workflows/generator_container_slsa3.yml@main
    with:
      image: ${{ needs.upload-docker.outputs.image_name }}
      digest: ${{ needs.upload-docker.outputs.digest }}
    secrets: inherit

  promote-docker-image:
    name: "Promote Docker Image"
    needs:
      - provenance-container
      - upload-docker
    runs-on: gha-production-medium
    container: ci-images-release.arti.tw.ee/k8s-deployer:4
    if: ${{ github.ref == 'refs/heads/main' }}

    steps:
      - name: Promote built artifact
        run: k8s-deployment trigger-image-promotion
        env:
          DEPLOY_IMAGE_NAME: intentpicker
          GH_ACCESS_TOKEN: ${{ secrets.K8S_PROMOTION_TOKEN }}


